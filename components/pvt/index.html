<script>
(function () {

  var args = null;
  var done = false;

  function ready() {
    window.parent.postMessage(
      { isStreamlitMessage: true, type: "streamlit:componentReady", apiVersion: 1 }, "*"
    );
  }

  function sendValue(val) {
    window.parent.postMessage(
      { isStreamlitMessage: true, type: "streamlit:setComponentValue",
        value: val, dataType: "json" }, "*"
    );
  }

  window.addEventListener("message", function (e) {
    if (!e.data.isStreamlitMessage) return;
    if (e.data.type === "streamlit:render") {
      args = e.data.args || {};
    }
  });

  var stim     = document.getElementById("stim");
  var msg      = document.getElementById("msg");
  var prog     = document.getElementById("prog");
  var btn      = document.getElementById("btn");
  var phaseEl  = document.getElementById("phase");

  var mode = null;
  var pCount = 0;
  var trials = [];
  var t0 = null;
  var waiting = false;
  var isiTimer = null;
  var blockEnd = 0;
  var clockTimer = null;
  var started = false;

  function isi() {
    var mn = (args && args.isi_min) || 2000;
    var mx = (args && args.isi_max) || 8000;
    return Math.random() * (mx - mn) + mn;
  }

  function fsMs()  { return (args && args.false_start_ms) || 100; }
  function pracN() { return (args && args.practice) || 3; }
  function durMs() { return (args && args.duration_ms) || 30000; }

  // ✅ FIX 2 → timer temizleme
  function clearTimers() {
    clearTimeout(isiTimer);
  }

  function arm() {
    clearTimers();

    waiting = true;
    t0 = null;

    stim.style.background = "#1A2235";
    stim.textContent = "Bekleyin…";

    isiTimer = setTimeout(function () {
      if (!mode) return;

      waiting = false;
      t0 = performance.now();

      stim.style.background = "#E5484D";
      stim.textContent = "TIKLA!";

      // ✅ FIX 1 → stimulus auto reset
      setTimeout(() => {
        stim.style.background = "#1A2235";
        stim.textContent = "Bekleyin…";
      }, 300);

    }, isi());
  }

  function record(rt, fs) {
    if (mode === "main") {
      trials.push({ rt: rt, false_start: fs });
    } else {
      pCount++;
    }
  }

  window.addEventListener("keydown", function (e) {
    if (e.code !== "Space") return;
    e.preventDefault();
    if (!mode) return;

    // early press
    if (waiting) {
      clearTimers();
      record(null, true);
      msg.textContent = "Erken basma!";

      stim.style.background = "#7A2E33";
      next();
      return;
    }

    if (t0 === null) return;

    var rt = Math.round(performance.now() - t0);
    t0 = null;

    // ✅ FIX 4 → UX feedback
    if (rt < fsMs()) {
      record(null, true);
      msg.textContent = "⚠ Erken (" + rt + " ms)";
    } else {
      record(rt, false);

      if (rt < 300) {
        msg.textContent = "⚡ Çok iyi (" + rt + " ms)";
      } else if (rt < 500) {
        msg.textContent = "✓ Normal (" + rt + " ms)";
      } else {
        msg.textContent = "⚠ Yavaş (" + rt + " ms)";
      }
    }

    stim.style.background = "#1F6E4A";
    next();
  });

  function next() {
    setTimeout(function () {
      if (!mode) return;

      if (mode === "practice" && pCount >= pracN()) {
        startMain();
        return;
      }

      arm();
    }, 600);
  }

  function startMain() {
    mode = "main";
    trials = [];

    phaseEl.textContent =
      "ANA BLOK · " + Math.round(durMs() / 1000) + " SN";

    msg.textContent = "Ana blok başladı.";

    blockEnd = performance.now() + durMs();

    clockTimer = setInterval(function () {
      var left = Math.max(
        0,
        Math.ceil((blockEnd - performance.now()) / 1000)
      );

      prog.textContent =
        "Kalan: " + left + " sn · Deneme: " + trials.length;

      if (left <= 0) endTest();

    }, 250);

    arm();
  }

  // ✅ FIX 3 → safe termination
  function endTest() {
    if (done) return;
    done = true;

    clearTimers();
    clearInterval(clockTimer);

    mode = null;

    stim.style.background = "#1A2235";
    stim.textContent = "Tamamlandı ✓";

    msg.textContent = "Sonuçlar kaydediliyor…";
    prog.textContent = "";

    ctDevice(function (dev) {
      sendValue({
        run_id: (args && args.run_id) || "unknown",
        test: "pvt",
        trials: trials,
        device: dev
      });
    });
  }

  btn.onclick = function () {
    if (started) return;

    started = true;
    btn.disabled = true;

    mode = "practice";
    pCount = 0;

    phaseEl.textContent =
      "PRATİK · " + pracN() + " DENEME";

    msg.textContent = "Pratik başladı.";

    arm();
  };

  function ctDevice(cb) {
    var frames = 0, t0d = performance.now();

    function loop(t) {
      frames++;
      if (t - t0d < 500) requestAnimationFrame(loop);
      else cb({
        refresh_hz: Math.round(frames / ((t - t0d) / 1000)),
        dpr: window.devicePixelRatio || 1,
        ua: navigator.userAgent
      });
    }

    requestAnimationFrame(loop);
  }

  var argWait = setInterval(function () {
    if (args !== null) {
      clearInterval(argWait);
      btn.disabled = false;
    }
  }, 100);

  setTimeout(function () {
    clearInterval(argWait);
    btn.disabled = false;
  }, 3000);

  ready();

})();
</script>
