<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: transparent; color: #F0F4FF; }
  #wrap { background: #10182B; border: 1px solid #1E2A45; border-radius: 14px; padding: 20px; text-align: center; }
  #phase { font-size: 11px; letter-spacing: 1px; color: #8B95B0; margin-bottom: 8px; }
  #stim {
    height: 170px; border-radius: 12px; background: #1A2235;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; font-weight: 700; cursor: pointer; user-select: none;
    transition: background 0.05s;
  }
  #msg  { margin-top: 12px; font-size: 14px; color: #F5A623; min-height: 18px; }
  #prog { margin-top: 4px;  font-size: 12px; color: #8B95B0; min-height: 16px; }
  #btn  {
    display: block; width: 100%; margin-top: 14px;
    background: #3D8BFF; color: #fff; border: none;
    padding: 12px; font-size: 16px; font-weight: 600;
    border-radius: 10px; cursor: pointer;
  }
  #btn:disabled { background: #1A2235; color: #4A526A; cursor: default; }
  kbd { background: #1A2235; border-radius: 4px; padding: 1px 6px; font-size: 11px; }
</style>
</head>
<body>
<div id="wrap">
  <div id="phase">PVT — PSİKOMOTOR VİJİLANS</div>
  <div id="stim">Hazır olun…</div>
  <div style="margin-top:8px;font-size:12px;color:#8B95B0">
    Kırmızıyı görünce <kbd>SPACE</kbd> tuşuna basın. Erken basmayın.
  </div>
  <div id="msg">Testi başlatmak için butona basın.</div>
  <div id="prog"></div>
</div>
<button id="btn" disabled>Pratiğe Başla</button>

<script>
(function () {
  /* ── Streamlit component protocol ── */
  var args = null;
  var done = false;

  function ready() {
    window.parent.postMessage(
      { isStreamlitMessage: true, type: "streamlit:componentReady", apiVersion: 1 }, "*"
    );
  }

  function sendValue(val) {
    window.parent.postMessage(
      { isStreamlitMessage: true, type: "streamlit:setComponentValue",
        value: val, dataType: "json" }, "*"
    );
  }

  window.addEventListener("message", function (e) {
    if (!e.data.isStreamlitMessage) return;
    if (e.data.type === "streamlit:render") {
      args = e.data.args || {};
    }
  });

  /* ── Test mantığı ── */
  var stim     = document.getElementById("stim");
  var msg      = document.getElementById("msg");
  var prog     = document.getElementById("prog");
  var btn      = document.getElementById("btn");
  var phaseEl  = document.getElementById("phase");

  var mode = null;   // "practice" | "main"
  var pCount = 0;
  var trials = [];   // {rt: ms|null, false_start: bool}
  var t0 = null;
  var waiting = false;
  var isiTimer = null;
  var blockEnd = 0;
  var clockTimer = null;
  var started = false;

  function isi() {
    var mn = (args && args.isi_min) || 2000;
    var mx = (args && args.isi_max) || 8000;
    return Math.random() * (mx - mn) + mn;
  }
  function fsMs()      { return (args && args.false_start_ms) || 100; }
  function pracN()     { return (args && args.practice)       || 3;   }
  function durMs()     { return (args && args.duration_ms)    || 30000; } // 30 saniye, gelecekte 3 dakika olabilir

  function arm() {
    waiting = true; t0 = null;
    stim.style.background = "#1A2235"; stim.textContent = "Bekleyin…";
    isiTimer = setTimeout(function () {
      if (!mode) return;
      waiting = false;
      t0 = performance.now();
      stim.style.background = "#E5484D"; stim.textContent = "TIKLA!";
    }, isi());
  }

  function record(rt, fs) {
    if (mode === "main") trials.push({ rt: rt, false_start: fs });
    else pCount++;
  }

window.addEventListener("keydown", function (e) {
    if (e.code !== "Space") return;
    e.preventDefault();
    if (!mode) return;
    if (waiting) {
      clearTimeout(isiTimer);
      record(null, true);
      msg.textContent = "Erken basma! Uyaranı bekleyin.";
      stim.style.background = "#7A2E33";
      next(); return;
    }
    if (t0 === null) return;
    var rt = Math.round(performance.now() - t0); t0 = null;
    if (rt < fsMs()) {
      record(null, true);
      msg.textContent = "Erken basma (" + rt + " ms)";
    } else {
      record(rt, false);
      msg.textContent = rt + " ms";
    }
    stim.style.background = "#1F6E4A";
    next();
  });

  function next() {
    setTimeout(function () {
      if (!mode) return;
      if (mode === "practice" && pCount >= pracN()) { startMain(); return; }
      arm();
    }, 600);
  }

  function startMain() {
    mode = "main"; trials = [];
    phaseEl.textContent = "ANA BLOK · " + Math.round(durMs() / 1000) + " SN";
    msg.textContent = "Ana blok başladı. Kırmızıyı görünce hemen tıklayın.";
    blockEnd = performance.now() + durMs();
    clockTimer = setInterval(function () {
      var left = Math.max(0, Math.ceil((blockEnd - performance.now()) / 1000));
      prog.textContent = "Kalan: " + left + " sn · Deneme: " + trials.length;
      if (left <= 0) endTest();
    }, 250);
    arm();
  }

  function endTest() {
    clearInterval(clockTimer); clearTimeout(isiTimer);
    mode = null; done = true;
    stim.style.background = "#1A2235"; stim.textContent = "Tamamlandı ✓";
    msg.textContent = "Sonuçlar kaydediliyor…"; prog.textContent = "";
    // Cihaz meta-verisi
    ctDevice(function (dev) {
      sendValue({
        run_id: (args && args.run_id) || "unknown",
        test: "pvt",
        trials: trials,
        device: dev
      });
    });
  }



  btn.onclick = function () {
    if (started) return;
    started = true;
    btn.disabled = true;
    mode = "practice"; pCount = 0;
    phaseEl.textContent = "PRATİK · " + pracN() + " DENEME";
    msg.textContent = "Pratik: kırmızıyı görünce tıklayın.";
    arm();
  };

  /* Ekran yenileme hızı tahmini (~500 ms) */
  function ctDevice(cb) {
    var frames = 0, t0d = performance.now();
    function loop(t) {
      frames++;
      if (t - t0d < 500) requestAnimationFrame(loop);
      else cb({ refresh_hz: Math.round(frames / ((t - t0d) / 1000)),
                dpr: window.devicePixelRatio || 1,
                ua: navigator.userAgent });
    }
    requestAnimationFrame(loop);
  }

  // args geldiğinde butonu aç; 3 sn içinde gelmezse yine aç
  var argWait = setInterval(function () {
    if (args !== null) { clearInterval(argWait); btn.disabled = false; }
  }, 100);
  setTimeout(function () { clearInterval(argWait); btn.disabled = false; }, 3000);

  


  ready();
})();
</script>
</body>
</html>
